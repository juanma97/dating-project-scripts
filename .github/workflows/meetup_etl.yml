name: Meetup Speed Dating ETL

on:
  workflow_dispatch: # Allows manual execution from the Actions tab in GitHub
  schedule:
    # Runs every Monday at 06:00 UTC (07:00 AM CET in Madrid)
    # Note: During Summer Time (CEST), Madrid is UTC+2, so this would run at 08:00 AM local time.
    # To run strictly at 07:00 AM CEST, change the cron to '0 5 * * 1' during summer.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # Install requirements if the file exists in the specified folder
        if [ -f meetup_etl_pipeline/requirements.txt ]; then pip install -r meetup_etl_pipeline/requirements.txt; fi
        
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 meetup_etl_pipeline/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 meetup_etl_pipeline/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Run Meetup ETL Script
      env:
        # Map GitHub Secrets to environment variables to keep credentials secure
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        SUPABASE_TABLE_NAME: ${{ secrets.SUPABASE_TABLE_NAME }}
      run: |
        # Execute the main Python script
        python meetup_etl_pipeline/main.py
